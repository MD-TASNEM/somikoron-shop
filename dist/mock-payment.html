<!doctype html>
<html>
  <head>
    <title>Mock Payment Gateway</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }
      .payment-method {
        border: 2px solid #ddd;
        margin: 10px 0;
        padding: 20px;
        border-radius: 8px;
        cursor: pointer;
      }
      .payment-method:hover {
        border-color: #007bff;
      }
      .payment-method h3 {
        margin: 0 0 10px 0;
        color: #333;
      }
      .payment-method p {
        margin: 5px 0;
        color: #666;
      }
      .btn {
        background: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin: 10px 5px;
      }
      .btn:hover {
        background: #0056b3;
      }
      .btn.cancel {
        background: #6c757d;
      }
      .btn.cancel:hover {
        background: #545b62;
      }
    </style>
  </head>
  <body>
    <h2>Mock Payment Gateway</h2>
    <p><strong>Order ID:</strong> <span id="order-id"></span></p>
    <p><strong>Amount:</strong> ৳<span id="amount"></span></p>

    <div class="payment-method" onclick="processPayment('card')">
      <h3>💳 Credit/Debit Card</h3>
      <p>Visa, Mastercard, AMEX</p>
      <button class="btn" onclick="processPayment('card')">
        Pay with Card
      </button>
    </div>

    <div class="payment-method" onclick="processPayment('bkash')">
      <h3>📱 bKash</h3>
      <p>Mobile Banking</p>
      <button class="btn" onclick="processPayment('bkash')">
        Pay with bKash
      </button>
    </div>

    <div class="payment-method" onclick="processPayment('nagad')">
      <h3>📱 Nagad</h3>
      <p>Mobile Banking</p>
      <button class="btn" onclick="processPayment('nagad')">
        Pay with Nagad
      </button>
    </div>

    <div class="payment-method" onclick="processPayment('rocket')">
      <h3>🚀 Rocket</h3>
      <p>Mobile Banking</p>
      <button class="btn" onclick="processPayment('rocket')">
        Pay with Rocket
      </button>
    </div>

    <button class="btn cancel" onclick="cancelPayment()">Cancel Payment</button>

    <script>
      // Get URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get("order_id");
      const amount = urlParams.get("amount");

      // Set values in page
      document.getElementById("order-id").textContent = orderId;
      document.getElementById("amount").textContent = amount;

      function processPayment(method) {
        // Simulate payment processing
        setTimeout(function () {
          window.location.href =
            "/payment/success?order_id=" +
            orderId +
            "&tran_id=SOM-" +
            orderId +
            "-" +
            Date.now() +
            "&method=" +
            method +
            "&status=success";
        }, 1500);
      }

      function cancelPayment() {
        window.location.href = "/payment/cancel?order_id=" + orderId;
      }
    </script>
  </body>
</html>
